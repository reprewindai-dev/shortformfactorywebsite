<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Audio sync interface -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Video with audio waves -->
  <rect x="40" y="40" width="150" height="100" rx="4" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  
  <!-- Audio waveform -->
  <path d="M50 90 Q55 80, 60 90 T70 90 T80 90 T90 90 T100 90 T110 90 T120 90 T130 90 T140 90 T150 90 T160 90 T170 90 T180 90" stroke="#00ff88" stroke-width="2" fill="none"/>
  
  <!-- Beat markers -->
  <circle cx="60" cy="90" r="3" fill="#00ff88"/>
  <circle cx="90" cy="90" r="3" fill="#00ff88"/>
  <circle cx="120" cy="90" r="3" fill="#00ff88"/>
  <circle cx="150" cy="90" r="3" fill="#00ff88"/>
  <circle cx="180" cy="90" r="3" fill="#00ff88"/>
  
  <!-- Music note -->
  <circle cx="115" cy="60" r="10" fill="#667eea" opacity="0.3"/>
  <text x="115" y="65" font-family="Arial" font-size="14" fill="#667eea" text-anchor="middle">♪</text>
  
  <!-- Sync indicators -->
  <circle cx="70" cy="120" r="5" fill="#00ff88" opacity="0.6"/>
  <circle cx="90" cy="120" r="5" fill="#00ff88" opacity="0.6"/>
  <circle cx="110" cy="120" r="5" fill="#00ff88" opacity="0.6"/>
  
  <!-- Mixing controls -->
  <rect x="210" y="40" width="140" height="100" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Volume sliders -->
  <rect x="220" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  <rect x="240" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  <rect x="260" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  <rect x="280" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  <rect x="300" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  <rect x="320" y="60" width="8" height="60" rx="4" fill="#667eea"/>
  
  <!-- Slider handles -->
  <rect x="218" y="80" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="238" y="70" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="258" y="85" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="278" y="75" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="298" y="90" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="318" y="65" width="12" height="4" rx="2" fill="#00ff88"/>
  <rect x="338" y="80" width="12" height="4" rx="2" fill="#00ff88"/>
  
  <!-- Beat matching indicator -->
  <circle cx="280" cy="35" r="8" fill="#00ff88" opacity="0.6"/>
  <text x="280" y="40" font-family="Arial" font-size="10" font-weight="bold" fill="#00ff88" text-anchor="middle">BPM</text>
  
  <!-- Licensing icon -->
  <circle cx="340" cy="35" r="8" fill="#667eea" opacity="0.3"/>
  <text x="340" y="40" font-family="Arial" font-size="10" font-weight="bold" fill="#667eea" text-anchor="middle">©</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Arial" font-size="24" font-weight="600" fill="white" text-anchor="middle">Add Music and Audio Sync</text>
  <text x="200" y="275" font-family="Arial" font-size="14" fill="white" opacity="0.8" text-anchor="middle">Beat-Matched Audio and Music Licensing</text>
</svg>