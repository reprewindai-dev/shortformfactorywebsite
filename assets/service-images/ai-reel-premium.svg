<svg width="600" height="360" viewBox="0 0 600 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020202" />
      <stop offset="60%" stop-color="#04110a" />
      <stop offset="100%" stop-color="#071c1d" />
    </linearGradient>
    <linearGradient id="ai-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C6FF40" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#4CFFD6" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="ai-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7BFF5A" />
      <stop offset="100%" stop-color="#50FFD9" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="360" rx="32" fill="url(#ai-bg)" />
  <rect x="40" y="28" width="520" height="304" rx="28" stroke="rgba(255,255,255,0.08)" stroke-width="2" />

  <circle cx="140" cy="140" r="120" fill="url(#ai-glow)" filter="url(#blur)" />
  <circle cx="420" cy="220" r="150" fill="url(#ai-glow)" opacity="0.35" filter="url(#blur)" />

  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <path d="M80 90H520" />
    <path d="M80 130H520" />
    <path d="M80 170H520" />
    <path d="M80 210H520" />
    <path d="M80 250H520" />
    <path d="M80 290H520" />
  </g>
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <path d="M140 70V310" />
    <path d="M220 70V310" />
    <path d="M300 70V310" />
    <path d="M380 70V310" />
    <path d="M460 70V310" />
  </g>

  <path d="M100 220C140 160 170 180 200 210C230 240 260 120 300 150C340 180 360 270 400 220C440 170 480 210 520 150" stroke="url(#ai-line)" stroke-width="6" stroke-linecap="round" fill="none" />
  <circle cx="300" cy="150" r="34" fill="rgba(4,17,10,0.8)" stroke="url(#ai-line)" stroke-width="4" />
  <polygon points="292,140 292,160 310,150" fill="#C6FF40" />

  <rect x="80" y="60" width="120" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" />
  <text x="140" y="84" text-anchor="middle" fill="#C6FF40" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="16" font-weight="600">AI SEQUENCE</text>

  <text x="80" y="330" fill="rgba(255,255,255,0.7)" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="18" letter-spacing="0.2em">REEL AUTOPILOT</text>
  <text x="520" y="330" fill="#C6FF40" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="14" text-anchor="end">12 CUTS · AUTO CAPTIONS</text>
</svg>
