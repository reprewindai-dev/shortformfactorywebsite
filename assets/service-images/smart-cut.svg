<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Smart cut interface -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Timeline with cuts -->
  <rect x="40" y="160" width="320" height="8" rx="4" fill="#667eea"/>
  
  <!-- Cut segments -->
  <rect x="40" y="160" width="60" height="8" rx="4" fill="#ff4444" opacity="0.6"/>
  <rect x="100" y="160" width="40" height="8" rx="4" fill="#00ff88" opacity="0.6"/>
  <rect x="140" y="160" width="80" height="8" rx="4" fill="#ff4444" opacity="0.6"/>
  <rect x="220" y="160" width="30" height="8" rx="4" fill="#00ff88" opacity="0.6"/>
  <rect x="250" y="160" width="50" height="8" rx="4" fill="#ff4444" opacity="0.6"/>
  <rect x="300" y="160" width="60" height="8" rx="4" fill="#00ff88" opacity="0.6"/>
  
  <!-- Video preview -->
  <rect x="40" y="40" width="200" height="100" rx="4" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  
  <!-- Cut indicators -->
  <line x1="100" y1="40" x2="100" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="140" y1="40" x2="140" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="220" y1="40" x2="220" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="250" y1="40" x2="250" y2="140" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Filler word indicators -->
  <rect x="70" y="60" width="30" height="15" rx="2" fill="#ff4444" opacity="0.3"/>
  <text x="85" y="70" font-family="Arial" font-size="8" fill="#ff4444" text-anchor="middle">um</text>
  
  <rect x="160" y="80" width="25" height="15" rx="2" fill="#ff4444" opacity="0.3"/>
  <text x="172" y="90" font-family="Arial" font-size="8" fill="#ff4444" text-anchor="middle">uh</text>
  
  <!-- AI processing -->
  <circle cx="140" cy="90" r="12" fill="#00ff88" opacity="0.3"/>
  <text x="140" y="95" font-family="Arial" font-size="12" font-weight="bold" fill="#00ff88" text-anchor="middle">AI</text>
  
  <!-- Resulting clean video -->
  <rect x="260" y="40" width="80" height="100" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Clean content indicator -->
  <rect x="270" y="60" width="60" height="60" rx="2" fill="#00ff88" opacity="0.1"/>
  <text x="300" y="95" font-family="Arial" font-size="12" font-weight="bold" fill="#00ff88" text-anchor="middle">Clean</text>
  
  <!-- Scissors icon -->
  <circle cx="230" cy="90" r="10" fill="#667eea" opacity="0.2"/>
  <text x="230" y="95" font-family="Arial" font-size="14" fill="#667eea" text-anchor="middle">✂</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Arial" font-size="24" font-weight="600" fill="white" text-anchor="middle">Video Trim and Smart Cut</text>
  <text x="200" y="275" font-family="Arial" font-size="14" fill="white" opacity="0.8" text-anchor="middle">Intelligent Filler Removal and Pacing</text>
</svg>