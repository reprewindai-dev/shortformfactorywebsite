<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Background removal interface -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Before/After comparison -->
  <rect x="40" y="40" width="140" height="100" rx="4" fill="#2d2d44" stroke="#ff4444" stroke-width="2"/>
  <rect x="200" y="40" width="140" height="100" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Before: Person with green background -->
  <circle cx="110" cy="90" r="25" fill="#00ff00" opacity="0.6"/>
  <circle cx="110" cy="90" r="15" fill="#667eea"/>
  <text x="110" y="125" font-family="Arial, sans-serif" font-size="10" fill="#ff4444" text-anchor="middle">Before</text>
  
  <!-- After: Clean background -->
  <circle cx="270" cy="90" r="15" fill="#667eea"/>
  <text x="270" y="125" font-family="Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="middle">After</text>
  
  <!-- Processing arrow -->
  <path d="M185 90 L195 90" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Chroma key tools -->
  <rect x="40" y="160" width="80" height="40" rx="4" fill="#667eea" opacity="0.2"/>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#667eea" text-anchor="middle">Chroma Key</text>
  
  <!-- Edge refinement -->
  <rect x="140" y="160" width="80" height="40" rx="4" fill="#00ff88" opacity="0.2"/>
  <text x="180" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00ff88" text-anchor="middle">Edge Refine</text>
  
  <!-- Spill removal -->
  <rect x="240" y="160" width="80" height="40" rx="4" fill="#667eea" opacity="0.2"/>
  <text x="280" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#667eea" text-anchor="middle">Spill Remove</text>
  
  <!-- Color matching -->
  <circle cx="340" cy="180" r="15" fill="#667eea" opacity="0.2"/>
  <text x="340" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#667eea" text-anchor="middle">🎨</text>
  
  <!-- Magic wand icon -->
  <circle cx="110" cy="60" r="8" fill="#00ff88" opacity="0.6"/>
  <text x="110" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00ff88" text-anchor="middle">✨</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Background Removal</text>
  <text x="200" y="275" font-family="Space Grotesk, sans-serif" font-size="14" fill="white" opacity="0.8" text-anchor="middle">Professional Green Screen Keying</text>
</svg>
