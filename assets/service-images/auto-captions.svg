<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Auto captions interface -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Video with speech waves -->
  <rect x="40" y="40" width="150" height="100" rx="4" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  
  <!-- Speech waves indicating audio -->
  <circle cx="115" cy="90" r="20" fill="#667eea" opacity="0.2"/>
  <path d="M105 90 Q110 85, 115 90 T125 90" stroke="#667eea" stroke-width="2" fill="none"/>
  <path d="M100 90 Q105 82, 110 90 T120 90 T130 90" stroke="#667eea" stroke-width="2" fill="none"/>
  
  <!-- AI processing indicator -->
  <circle cx="115" cy="60" r="8" fill="#00ff88" opacity="0.6"/>
  <text x="115" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00ff88" text-anchor="middle">AI</text>
  
  <!-- Text output -->
  <rect x="210" y="40" width="150" height="100" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Caption text lines -->
  <rect x="220" y="55" width="130" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="65" width="110" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="75" width="120" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="85" width="100" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="95" width="115" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="105" width="105" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  <rect x="220" y="115" width="125" height="3" rx="1" fill="#00ff88" opacity="0.8"/>
  
  <!-- Accuracy check -->
  <circle cx="320" cy="60" r="10" fill="#00ff88" opacity="0.2"/>
  <text x="320" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00ff88" text-anchor="middle">✓</text>
  <text x="320" y="80" font-family="Arial, sans-serif" font-size="8" fill="#00ff88" text-anchor="middle">99%</text>
  
  <!-- SRT file indicator -->
  <rect x="40" y="160" width="80" height="40" rx="4" fill="#667eea" opacity="0.2"/>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#667eea" text-anchor="middle">SRT</text>
  
  <!-- Platform icons -->
  <rect x="140" y="160" width="40" height="40" rx="4" fill="#00ff88" opacity="0.2"/>
  <text x="160" y="185" font-family="Arial, sans-serif" font-size="10" fill="#00ff88" text-anchor="middle">ALL</text>
  
  <rect x="200" y="160" width="40" height="40" rx="4" fill="#667eea" opacity="0.2"/>
  <text x="220" y="185" font-family="Arial, sans-serif" font-size="10" fill="#667eea" text-anchor="middle">SUB</text>
  
  <rect x="260" y="160" width="40" height="40" rx="4" fill="#667eea" opacity="0.2"/>
  <text x="280" y="185" font-family="Arial, sans-serif" font-size="10" fill="#667eea" text-anchor="middle">CC</text>
  
  <!-- Manual review check -->
  <circle cx="320" cy="180" r="10" fill="#667eea" opacity="0.2"/>
  <text x="320" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#667eea" text-anchor="middle">👁</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Auto Captions</text>
  <text x="200" y="275" font-family="Space Grotesk, sans-serif" font-size="14" fill="white" opacity="0.8" text-anchor="middle">AI Transcription with Manual Review</text>
</svg>
