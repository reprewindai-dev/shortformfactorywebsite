<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Social media platforms -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Phone frames for different platforms -->
  <rect x="40" y="40" width="60" height="100" rx="8" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  <rect x="110" y="40" width="60" height="100" rx="8" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  <rect x="180" y="40" width="60" height="100" rx="8" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  
  <!-- Platform icons -->
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">IG</text>
  <text x="140" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">TT</text>
  <text x="210" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">YT</text>
  
  <!-- Connection lines -->
  <path d="M100 90 L110 90" stroke="#00ff88" stroke-width="2"/>
  <path d="M170 90 L180 90" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Video content indicators -->
  <rect x="45" y="110" width="50" height="20" rx="2" fill="#667eea" opacity="0.6"/>
  <rect x="115" y="110" width="50" height="20" rx="2" fill="#667eea" opacity="0.6"/>
  <rect x="185" y="110" width="50" height="20" rx="2" fill="#667eea" opacity="0.6"/>
  
  <!-- Edit tools -->
  <circle cx="280" cy="70" r="15" fill="#00ff88" opacity="0.2"/>
  <text x="280" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle">✂</text>
  
  <circle cx="320" cy="70" r="15" fill="#00ff88" opacity="0.2"/>
  <text x="320" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle">🎨</text>
  
  <!-- Combined output -->
  <rect x="260" y="100" width="100" height="80" rx="8" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="12" fill="#00ff88" text-anchor="middle">Combined</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Social Media Edit</text>
  <text x="200" y="275" font-family="Space Grotesk, sans-serif" font-size="14" fill="white" opacity="0.8" text-anchor="middle">Multi-Platform Content Creation</text>
</svg>
