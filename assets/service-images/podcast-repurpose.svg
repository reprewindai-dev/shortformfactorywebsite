<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Long-form to short-form transformation -->
  <rect x="20" y="20" width="360" height="200" rx="8" fill="url(#card)" opacity="0.9"/>
  
  <!-- Long-form video (podcast/YouTube) -->
  <rect x="40" y="40" width="100" height="120" rx="4" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  <rect x="50" y="50" width="80" height="60" rx="2" fill="#1a1a2e"/>
  
  <!-- Microphone icon -->
  <circle cx="90" cy="80" r="12" fill="#667eea" opacity="0.3"/>
  <rect x="87" y="75" width="6" height="10" rx="3" fill="#667eea"/>
  <rect x="85" y="85" width="10" height="3" rx="1" fill="#667eea"/>
  
  <!-- Waveform -->
  <path d="M50 120 Q55 115, 60 120 T70 120 T80 120 T90 120 T100 120 T110 120 T120 120" stroke="#00ff88" stroke-width="2" fill="none"/>
  
  <!-- Arrow transformation -->
  <path d="M150 100 L180 100" stroke="#00ff88" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
    </marker>
  </defs>
  
  <!-- Short-form clips -->
  <rect x="200" y="40" width="60" height="50" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  <rect x="270" y="40" width="60" height="50" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  <rect x="200" y="100" width="60" height="50" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  <rect x="270" y="100" width="60" height="50" rx="4" fill="#2d2d44" stroke="#00ff88" stroke-width="2"/>
  
  <!-- Play buttons on clips -->
  <circle cx="230" cy="65" r="8" fill="#00ff88" opacity="0.3"/>
  <polygon points="227,62 227,68 233,65" fill="#00ff88"/>
  
  <circle cx="300" cy="65" r="8" fill="#00ff88" opacity="0.3"/>
  <polygon points="297,62 297,68 303,65" fill="#00ff88"/>
  
  <circle cx="230" cy="125" r="8" fill="#00ff88" opacity="0.3"/>
  <polygon points="227,122 227,128 233,125" fill="#00ff88"/>
  
  <circle cx="300" cy="125" r="8" fill="#00ff88" opacity="0.3"/>
  <polygon points="297,122 297,128 303,125" fill="#00ff88"/>
  
  <!-- Platform indicators -->
  <text x="230" y="165" font-family="Arial" font-size="8" fill="#00ff88" text-anchor="middle">TT</text>
  <text x="300" y="165" font-family="Arial" font-size="8" fill="#00ff88" text-anchor="middle">IG</text>
  <text x="230" y="220" font-family="Arial" font-size="8" fill="#00ff88" text-anchor="middle">YT</text>
  <text x="300" y="220" font-family="Arial" font-size="8" fill="#00ff88" text-anchor="middle">FB</text>
  
  <!-- Magic wand icon -->
  <circle cx="160" cy="140" r="10" fill="#667eea" opacity="0.2"/>
  <text x="160" y="145" font-family="Arial" font-size="14" fill="#667eea" text-anchor="middle">✨</text>
  
  <!-- Service title -->
  <text x="200" y="250" font-family="Arial" font-size="24" font-weight="600" fill="white" text-anchor="middle">Podcast and YouTube Repurpose</text>
  <text x="200" y="275" font-family="Arial" font-size="14" fill="white" opacity="0.8" text-anchor="middle">Long-Form to Viral Short-Form</text>
</svg>
